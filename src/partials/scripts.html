<script>
  // Drag-to-scroll for the screenshot galleries (touch swipe already works natively).
  document.querySelectorAll(".gallery").forEach((gallery) => {
    let down = false, startX = 0, startScroll = 0, moved = false;
    gallery.addEventListener("pointerdown", (e) => {
      if (e.pointerType === "touch") return; // let native touch scrolling handle it
      down = true;
      moved = false;
      startX = e.clientX;
      startScroll = gallery.scrollLeft;
      gallery.setPointerCapture(e.pointerId);
    });
    gallery.addEventListener("pointermove", (e) => {
      if (!down) return;
      const dx = e.clientX - startX;
      if (Math.abs(dx) > 4) moved = true;
      gallery.scrollLeft = startScroll - dx;
    });
    const end = () => { down = false; if (moved) gallery.style.cursor = ""; };
    gallery.addEventListener("pointerup", end);
    gallery.addEventListener("pointercancel", end);
    gallery.addEventListener("dragstart", (e) => moved && e.preventDefault());
  });
</script>
