<section class="relative overflow-hidden">
  <div
    class="pointer-events-none absolute inset-x-0 -top-32 h-72 bg-[radial-gradient(60%_60%_at_50%_0%,var(--color-brand-soft),transparent_70%)]"
    aria-hidden="true"
  ></div>

  <div class="container-x grid gap-10 pt-12 pb-14 md:grid-cols-[1.05fr_0.95fr] md:items-center md:pt-20 md:pb-20">
    <div>
      <p class="eyebrow mb-5 flex flex-wrap items-center gap-x-3 gap-y-2">
        <span>{{LOCATION}}</span>
        <span class="text-line" aria-hidden="true">/</span>
        <span class="pill-live">Open to work</span>
      </p>

      <h1 class="font-display text-[clamp(2.6rem,11vw,4.75rem)] font-extrabold leading-[0.95] tracking-[-0.03em]">
        {{NAME}}
      </h1>

      <p class="mt-4 font-mono text-sm text-brand">{{HEADLINE}}</p>

      <p class="mt-6 max-w-xl text-lg leading-relaxed text-muted">
        {{THESIS}}
      </p>

      <div class="mt-8 flex flex-wrap gap-3">
        <a
          href="#work"
          class="inline-flex items-center gap-2 rounded-full bg-brand px-6 py-3 text-sm font-semibold text-white transition hover:translate-y-[-2px] hover:shadow-lg hover:shadow-brand/30"
        >
          View the work
          <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>
        <a
          href="mailto:{{EMAIL}}"
          class="inline-flex items-center gap-2 rounded-full border border-line bg-surface px-6 py-3 text-sm font-semibold transition hover:border-brand hover:text-brand"
        >
          Email me
        </a>
      </div>

      <dl class="mt-10 grid max-w-md grid-cols-3 gap-4 border-t border-line pt-6">
        {{STATS}}
      </dl>
    </div>

    <!-- Device cluster: the apps, in hand. -->
    <div class="relative mx-auto flex w-full max-w-sm items-end justify-center gap-4 md:max-w-none" aria-hidden="true">
      <div class="phone hidden translate-y-4 rotate-[-6deg] opacity-90 sm:block">
        <div class="phone__screen">
          <span class="phone__notch"></span>
          <div class="shot-placeholder">
            <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.6"/><circle cx="8.5" cy="8.5" r="1.8" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>App<br>screenshot</span>
          </div>
        </div>
      </div>
      <div class="phone z-10 scale-[1.05]">
        <div class="phone__screen">
          <span class="phone__notch"></span>
          <div class="shot-placeholder">
            <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.6"/><circle cx="8.5" cy="8.5" r="1.8" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>App<br>screenshot</span>
          </div>
        </div>
      </div>
      <div class="phone hidden translate-y-4 rotate-[6deg] opacity-90 sm:block">
        <div class="phone__screen">
          <span class="phone__notch"></span>
          <div class="shot-placeholder">
            <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.6"/><circle cx="8.5" cy="8.5" r="1.8" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>App<br>screenshot</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
