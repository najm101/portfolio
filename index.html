<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdelrahman Negm | Mobile Engineer</title>
    <meta name="description" content="Portfolio of Abdelrahman Negm, a Mobile Software Developer specializing in Flutter, iOS, and Android development." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Syne', 'sans-serif'],
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
              neon: {
                DEFAULT: "hsl(var(--neon))",
                foreground: "hsl(var(--neon-foreground))"
              }
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Light Theme */
        --background: 0 0% 98%; /* White-ish */
        --foreground: 240 10% 3.9%; /* Dark Grey Text */
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --primary: 240 5.9% 10%;
        --primary-foreground: 0 0% 98%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --muted: 240 4.8% 95.9%;
        --muted-foreground: 240 3.8% 46.1%;
        --accent: 74 60% 40%; 
        --accent-foreground: 0 0% 98%;
        --border: 240 5.9% 90%;
        --input: 240 5.9% 90%;
        --ring: 74 60% 40%;
        
        /* Neon in light mode needs to be readable */
        --neon: 74 80% 35%; /* Darker Lime Green for readability on white */
        --neon-foreground: 0 0% 100%;
      }
      .dark {
        --background: 240 5% 5%; /* Very dark grey/black #0d0d0d */
        --foreground: 0 0% 95%;
        --card: 240 4% 10%; /* Slightly lighter #1a1a1c */
        --card-foreground: 0 0% 98%;
        --primary: 74 80% 73%; /* Neon Lime #ccf381 */
        --primary-foreground: 240 5.9% 10%;
        --secondary: 240 3.7% 15.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 240 3.7% 15.9%;
        --muted-foreground: 240 5% 64.9%;
        --accent: 74 80% 73%;
        --accent-foreground: 240 5.9% 10%;
        --border: 240 3.7% 15.9%;
        --input: 240 3.7% 15.9%;
        --ring: 74 80% 73%;
        
        --neon: 74 80% 73%; /* Original Neon Lime */
        --neon-foreground: 240 5.9% 10%;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Syne', sans-serif;
      }
      .prose ul {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .prose p {
        margin-bottom: 0.5rem;
      }
      .prose a {
        color: hsl(var(--neon));
        text-decoration: underline;
        text-underline-offset: 4px;
        font-weight: 500;
      }
      
      /* Glow effect behind the image - only visible in dark mode effectively */
      .glow-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(204,243,129,0.15) 0%, rgba(0,0,0,0) 70%);
        z-index: -1;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      /* Hide glow in light mode to prevent dirty look */
      :not(.dark) .glow-bg {
        opacity: 0;
      }

      /* Quill Dark Mode Overrides */
      .dark .ql-toolbar {
        background-color: hsl(var(--card));
        border-color: hsl(var(--border)) !important;
      }
      .dark .ql-container {
        border-color: hsl(var(--border)) !important;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
      }
      .dark .ql-toolbar .ql-stroke {
        stroke: hsl(var(--muted-foreground));
      }
      .dark .ql-toolbar .ql-fill {
        fill: hsl(var(--muted-foreground));
      }
      .dark .ql-toolbar .ql-picker {
        color: hsl(var(--muted-foreground));
      }
      .dark .ql-editor.ql-blank::before {
        color: hsl(var(--muted-foreground));
        font-style: italic;
      }
      
      /* Quill Editor Height */
      .ql-editor {
        min-height: 150px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@6.22.3",
    "quill": "https://aistudiocdn.com/quill@^1.3.7"
  }
}
</script>
</head>
  <body class="bg-background text-foreground antialiased min-h-screen selection:bg-neon selection:text-neon-foreground transition-colors duration-300">
    <div id="root"></div>
  </body>
</html>
